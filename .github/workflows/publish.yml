name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: '发布目标'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: 构建分发包
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: 构建分发包
        run: python -m build

      - name: 生成分发包哈希值
        id: hash
        run: |
          cd dist
          hashes=$(sha256sum * | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  publish-to-testpypi:
    name: 发布到 TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi') ||
      (github.event_name == 'release' && github.event.release.prerelease == true)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 发布到 TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-to-pypi:
    name: 发布到 PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi') ||
      (github.event_name == 'release' && github.event.release.prerelease == false)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-publish:
    name: 验证发布结果
    needs: [build, publish-to-pypi]
    runs-on: ubuntu-latest
    if: needs.publish-to-pypi.result == 'success'

    steps:
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 等待 PyPI 同步
        run: sleep 30

      - name: 验证安装
        run: |
          pip install foxcode --no-cache-dir
          foxcode --help || echo "命令可能需要额外配置"
        continue-on-error: true
